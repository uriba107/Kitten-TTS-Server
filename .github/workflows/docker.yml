name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag suffix
        id: vars
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPO=$REPO_LOWER" >> $GITHUB_OUTPUT
          if [[ ${{ github.ref }} == refs/tags/v* ]]; then
            echo "SUFFIX=-${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
          else
            echo "SUFFIX=" >> $GITHUB_OUTPUT
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push CUDA image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ steps.vars.outputs.REPO }}:cuda${{ steps.vars.outputs.SUFFIX }}
            ${{ steps.vars.outputs.IS_TAG == 'true' && format('ghcr.io/{0}:cuda-latest', steps.vars.outputs.REPO) || '' }}
          build-args: |
            RUNTIME=nvidia

      - name: Build and push CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ steps.vars.outputs.REPO }}:cpu${{ steps.vars.outputs.SUFFIX }}
            ${{ steps.vars.outputs.IS_TAG == 'true' && format('ghcr.io/{0}:cpu-latest', steps.vars.outputs.REPO) || '' }}
          build-args: |
            RUNTIME=cpu
