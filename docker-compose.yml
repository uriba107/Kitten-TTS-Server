services:
  kitten-tts-server:
    image: ghcr.io/uriba107/kitten-tts-server:cpu-latest
    ports:
      - "${PORT:-8005}:8005"
    volumes:
      # Mount local config file for persistence
      - ./config.yaml:/app/config.yaml
      # Mount local directories for persistent app data
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      # Named volume for Hugging Face model cache to persist across container rebuilds
      - hf_cache:/app/hf_cache

    restart: unless-stopped
    environment:
      # Enable faster Hugging Face downloads inside the container
      - HF_HUB_ENABLE_HF_TRANSFER=1
      # TTS queue settings (override config.yaml without mounting a custom file)
      # - KITTEN_MAX_QUEUE_DEPTH=10  # Max queued TTS requests before returning 503
      # - KITTEN_HOST=0.0.0.0
      # - KITTEN_PORT=8005

# Define the named volume for the Hugging Face cache
volumes:
  hf_cache:
